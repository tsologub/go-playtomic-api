name: Check Tournaments

on:
  schedule:
    # Run every 60 minutes
    - cron: '*/59 * * * *'
  workflow_dispatch:

jobs:
  check-tournaments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull state files from main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- tournament-state.json || echo "State file doesn't exist yet"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # if: always() so a failure in T doesn't block K from running - they're
      # independent tenant configs, and the state commit below should still
      # happen for whichever ones succeeded.
      # ACCESS_TOKEN falls back to env.ROTATED_ACCESS_TOKEN first: if T below
      # refreshes it, K picks up the fresh one instead of independently
      # hitting /v3/auth/token again for the same expired token (secrets.*
      # is resolved once at job start, so it wouldn't see T's update).
      - name: Run playtomic-watch T
        if: always()
        run: >
          go run ./cmd/playtomic-watch
          -config configs/t-tournaments-config.yaml
          -telegram-token "$TELEGRAM_BOT_TOKEN"
          -telegram-chat-id "$TELEGRAM_CHAT_ID"
          tournaments
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          ACCESS_TOKEN: ${{ env.ROTATED_ACCESS_TOKEN || secrets.ACCESS_TOKEN }}

      - name: Run playtomic-watch K
        if: always()
        run: >
          go run ./cmd/playtomic-watch
          -config configs/k-tournaments-config.yaml
          -telegram-token "$TELEGRAM_BOT_TOKEN"
          -telegram-chat-id 844005776
          tournaments
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          ACCESS_TOKEN: ${{ env.ROTATED_ACCESS_TOKEN || secrets.ACCESS_TOKEN }}

      # Runs even if T or K failed, since the access token can still have
      # been refreshed before some other tenant failed. Persisting it means
      # the next scheduled run reuses it instead of hitting /v3/auth/token
      # again.
      - name: Persist refreshed access token
        if: always() && env.ROTATED_ACCESS_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set ACCESS_TOKEN --body "$ROTATED_ACCESS_TOKEN" --repo ${{ github.repository }}

      - name: Commit and push state file to main
        if: always()
        run: |
          git add tournament-state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update tournament state [skip ci]"
            git push origin main
          fi
