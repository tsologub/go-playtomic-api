name: Check Tournaments

on:
  schedule:
    # Run every 60 minutes
    - cron: '*/59 * * * *'
  workflow_dispatch:

jobs:
  check-tournaments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull state files from main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- tournament-state.json || echo "State file doesn't exist yet"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # if: always() so a failure in T doesn't block K from running - they're
      # independent tenant configs, and the state commit below should still
      # happen for whichever ones succeeded.
      # ACCESS_TOKEN/REFRESH_TOKEN fall back to env.ROTATED_* first: if T
      # below performs a token exchange, K picks up the fresh values instead
      # of independently exchanging with an already-invalidated refresh
      # token (secrets.* is resolved once at job start, so it wouldn't see
      # T's update - and the API invalidates the previous refresh token on
      # every exchange, so K reusing the stale one would fail outright).
      - name: Run playtomic-watch T
        if: always()
        run: >
          go run ./cmd/playtomic-watch
          -config configs/t-tournaments-config.yaml
          -telegram-token "$TELEGRAM_BOT_TOKEN"
          -telegram-chat-id "$TELEGRAM_CHAT_ID"
          tournaments
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REFRESH_TOKEN: ${{ env.ROTATED_REFRESH_TOKEN || secrets.REFRESH_TOKEN }}
          ACCESS_TOKEN: ${{ env.ROTATED_ACCESS_TOKEN || secrets.ACCESS_TOKEN }}

      - name: Run playtomic-watch K
        if: always()
        run: >
          go run ./cmd/playtomic-watch
          -config configs/k-tournaments-config.yaml
          -telegram-token "$TELEGRAM_BOT_TOKEN"
          -telegram-chat-id 844005776
          tournaments
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          REFRESH_TOKEN: ${{ env.ROTATED_REFRESH_TOKEN || secrets.REFRESH_TOKEN }}
          ACCESS_TOKEN: ${{ env.ROTATED_ACCESS_TOKEN || secrets.ACCESS_TOKEN }}

      # Runs even if T or K failed, since a token exchange can still have
      # happened before some other tenant failed. Both the access token and
      # the refresh token are rotated and invalidated by the API on every
      # exchange, so both must be persisted or the next scheduled run will
      # fail with a stale one.
      - name: Persist rotated tokens
        if: always() && (env.ROTATED_ACCESS_TOKEN != '' || env.ROTATED_REFRESH_TOKEN != '')
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$ROTATED_ACCESS_TOKEN" ]; then
            gh secret set ACCESS_TOKEN --body "$ROTATED_ACCESS_TOKEN" --repo ${{ github.repository }}
          fi
          if [ -n "$ROTATED_REFRESH_TOKEN" ]; then
            gh secret set REFRESH_TOKEN --body "$ROTATED_REFRESH_TOKEN" --repo ${{ github.repository }}
          fi

      - name: Commit and push state file to main
        if: always()
        run: |
          git add tournament-state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update tournament state [skip ci]"
            git push origin main
          fi
