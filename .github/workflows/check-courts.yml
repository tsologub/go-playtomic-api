name: Check Courts

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-courts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull state files from main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- court-state.json || echo "State file doesn't exist yet"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run playtomic-watch T
        run: >
          go run ./cmd/playtomic-watch
          -config configs/t-courts-config.yaml
          -court-state court-state.json
          -telegram-token "$TELEGRAM_BOT_TOKEN"
          -telegram-chat-id "$TELEGRAM_CHAT_ID"
          courts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      # Runs even if the step above failed, since the access token can still
      # have been refreshed before some other tenant failed. Persisting it
      # means the next scheduled run reuses it instead of hitting
      # /v3/auth/token again.
      - name: Persist refreshed access token
        if: always() && env.ROTATED_ACCESS_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set ACCESS_TOKEN --body "$ROTATED_ACCESS_TOKEN" --repo ${{ github.repository }}

      - name: Commit and push state file to main
        if: always()
        run: |
          git add court-state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update court state [skip ci]"
            git push origin main
          fi
